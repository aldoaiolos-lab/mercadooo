                        }
                    }

                    if (esDoble) {
                        if (modo === 'lluvia' && (idx === 2 || idx === 3)) {
                            nums[idx] = cD;
                            continue;
                        }
                        else if (modo === 'diagonal') {
                            if (colCount === 4 && (idx === 5 || idx === 10)) { nums[idx] = cD; continue; }
                            if (colCount === 5 && (idx === 6 || idx === 18)) { nums[idx] = cD; continue; }
                            if (colCount === 3 && (idx === 2 || idx === 6)) { nums[idx] = cD; continue; }
                        }
                        else {
                            if ((opcionBase === '8_tabloide') && (idx === 5 || idx === 10)) {
                                nums[idx] = cD;
                                continue;
                            }
                            if ((opcionBase !== '8_tabloide') && (idx === 5 || idx === 6)) {
                                nums[idx] = cD;
                                continue;
                            }
                            if (isCruzada && (idx === 5 || idx === 6)) {
                                nums[idx] = cD;
                                continue;
                            }
                        }
                    }

                    let estampitaValida = extraerEstampita(cartasRegistradasEnTabla, cD);
                    nums[idx] = estampitaValida;
                    cartasRegistradasEnTabla.push(estampitaValida);
                }

                let tablaW = c.tW; let tablaH = c.tH; let cardW = c.fW; let cardH = c.fH;

                if (modo === 'lluvia') {
                    if (opcionBase === '20' || opcionBase === '24') {
                        tablaW = 3.3; tablaH = 6.8; cardW = 1.5; cardH = 1.5;
                    } else if (opcionBase === '24V') {
                        tablaW = 5.2; tablaH = 6.0; cardW = 2.1; cardH = 1.4;
                    } else {
                        tablaW = 4.6; tablaH = 9.7; cardW = 2.5; cardH = 2.5;
                    }
                }

                let casillasHtml = nums.map((n) => {
                    if (n === null) {
                        return `<div class="casilla" style="width:${cardW}cm; height:${cardH}cm; background: ${colorCalle};"></div>`;
                    }
                    return `
                        <div class="casilla" style="width:${cardW}cm; height:${cardH}cm; background: white; border: none;">
                            <img src="imagenes/${n}.jpg" class="foto" 
                                 onerror="if(this.src.indexOf('.jpg') !== -1) { this.src='imagenes/${n}.png'; } 
                                          else if(this.src.indexOf('.png') !== -1) { this.src='imagenes/${n}.jpeg'; } 
                                          else if(this.src.indexOf('.jpeg') !== -1) { this.src='imagenes/${n}.webp'; }">
                        </div>`;
                }).join('');

                let estiloAdicionalTabla = `border: 1px solid ${colorCalle};`;

                todasLasTablasHtml.push(`
                    <div class="tabla" style="width:${tablaW}cm; height:${tablaH}cm; background:${colorCalle}; ${estiloAdicionalTabla} margin: 0;">
                        <div class="cuadricula" style="grid-template-columns: repeat(${colCount}, auto); grid-template-rows: repeat(${rowCount}, auto); gap: ${c.gap};">
                            ${casillasHtml}
                        </div>
                    </div>`);
            }
        }

        let indexTabla = 0;
        for (let h = 0; h < cantHojas; h++) {
            let tablasDeEstaHoja = [];
            for (let t = 0; t < totalTablasEfectivas; t++) {
                if (todasLasTablasHtml[indexTabla]) {
                    tablasDeEstaHoja.push(todasLasTablasHtml[indexTabla]);
                    indexTabla++;
                }
            }

            if (opcionBase === "12_cartones") {
                let cartonesHtml = "";
                for (let k = 0; k < tablasDeEstaHoja.length; k += 4) {
                    let tablasDelCarton = tablasDeEstaHoja.slice(k, k + 4);
                    cartonesHtml += `
                        <div class="carton-contenedor" style="width: 13cm; height: 20.5cm; background: ${colorCalle}; display: grid; grid-template-columns: repeat(2, auto); grid-template-rows: repeat(2, auto); gap: 0.4cm; padding: 0.2cm; box-sizing: border-box; justify-content: center; align-content: center; border-radius: 5px; margin: 0 10px;">
                            ${tablasDelCarton.join('')}
                        </div>`;
                }
                htmlFinal += `
                    <div class="hoja-tabloide ${c.orient}" style="background:${colorFondo}; display: flex; justify-content: center; align-items: center; gap: 0.4cm; padding: 0;">
                        ${cartonesHtml}
                    </div>`;
            }
            else if (opcionBase === "12_3x3" || opcionBase === "4_maquina" || opcionBase === "8_tabloide") {
                let contenidoMatriz = tablasDeEstaHoja.join('');
                let colGrid = "repeat(2, auto)"; let rowGrid = "repeat(2, auto)"; let claseGridInterno = "grid-maquina-4";

                if (opcionBase === "12_3x3") {
                    colGrid = "repeat(3, auto)"; rowGrid = "repeat(4, auto)"; claseGridInterno = "grid-maquina-12";
                } else if (opcionBase === "8_tabloide") {
                    colGrid = "repeat(4, auto)"; rowGrid = "repeat(2, auto)"; claseGridInterno = "grid-tabloide-8";
                }

                let tipoPapelHoja = (opcionBase === "8_tabloide") ? c.orient : "hoja-maquina";

                htmlFinal += `
                    <div class="hoja-tabloide ${tipoPapelHoja}" style="background:${colorFondo}; page-break-after: always;">
                        <div class="${claseGridInterno}" style="grid-template-columns: ${colGrid}; grid-template-rows: ${rowGrid};">
                            ${contenidoMatriz}
                        </div>
                    </div>`;
            } 
            else if (opcionBase === "40") {
                htmlFinal += `
                    <div class="hoja-tabloide ${c.orient}" style="background:${colorFondo}; display: flex !important; flex-direction: column; align-items: center; justify-content: center; padding: 0.4cm; box-sizing: border-box;">
                        <div contenteditable="true" class="titulo-editable" style="color: ${colorCalle}; font-size: 24px; font-weight: bold; width: 100%; text-align: center; margin-bottom: 0.4cm;">
                            Haz clic aquí para escribir el nombre
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(${c.cols}, auto); justify-content: center; align-content: center; gap: ${margenDinamico};">
                            ${tablasDeEstaHoja.join('')}
                        </div>
                    </div>`;
            }
            else {
                let columnasHoja = (modo === 'lluvia' && (opcionBase === '20V' || opcionBase === '20')) ? 'repeat(5, auto)' : `repeat(${c.cols}, auto)`;
                if (modo === 'lluvia' && opcionBase === '24') columnasHoja = 'repeat(6, auto)';
                if (modo === 'lluvia' && opcionBase === '24V') columnasHoja = 'repeat(4, auto)'; 

                htmlFinal += `<div class="hoja-tabloide ${c.orient}" style="background:${colorFondo}; grid-template-columns: ${columnasHoja};">${tablasDeEstaHoja.join('')}</div>`;
            }
        }
        main.innerHTML = htmlFinal;
    }

    function procesarStickers() {
        let seleccion = document.getElementById('opcionStickers').value;
        if (seleccion === '50cts_solo') {
            generarPlanillaStickers(2.2, false);
        } else if (seleccion === '1peso_solo') {
            generarPlanillaStickers(2.1, false);
        } else if (seleccion === 'combo_50cts') {
            generarPlanillaStickers(2.2, true);
        } else if (seleccion === 'combo_1peso') {
            generarPlanillaStickers(2.1, true);
        }
    }

    function generarPlanillaStickers(diametroChico, esCombo) {
        const main = document.getElementById('main-container');
        const styleTag = document.getElementById('page-style');
        const colorFondo = document.getElementById('cFondo').value;
        const cantHojas = parseInt(document.getElementById('cantHojas').value) || 1;
        
        styleTag.innerHTML = `@page { size: 11in 17in; margin: 0; }`;
        main.innerHTML = '';

        let gap = 0.1; let htmlFinal = "";
        let anchoUtil = 26.5; let altoUtilSuperior = 28.0; 

        let colsSup = Math.floor((anchoUtil + gap) / (diametroChico + gap));
        let rowsSup = Math.floor((altoUtilSuperior + gap) / (diametroChico + gap));
        let totalChicosArriba = colsSup * rowsSup;

        let diametroGrande = 11.5; let tiraAncho = 2.0; let tiraLargo = 5.5;  
        let anchoOcupadoInferior = diametroGrande + 0.4 + tiraAncho;
        let anchoRestanteInferior = anchoUtil - anchoOcupadoInferior;

        let colsInfDerecha = Math.floor((anchoRestanteInferior + gap) / (diametroChico + gap));
        let rowsInfDerecha = Math.floor((12.2 + gap) / (diametroChico + gap));
        let totalChicosAbajoDerecha = colsInfDerecha * rowsInfDerecha;

        for (let h = 0; h < cantHojas; h++) {
            let chicosArribaHtml = "";
            for (let i = 0; i < totalChicosArriba; i++) {
                chicosArribaHtml += `
                    <div class="casilla" style="width:${diametroChico}cm; height:${diametroChico}cm; border-radius:50%; overflow:hidden; background:white;">
                        ${obtenerHtmlStickerBase()}
                    </div>`;
            }

            let chicosAbajoDerechaHtml = "";
            if (esCombo) {
                for (let i = 0; i < totalChicosAbajoDerecha; i++) {
                    chicosAbajoDerechaHtml += `
                        <div class="casilla" style="width:${diametroChico}cm; height:${diametroChico}cm; border-radius:50%; overflow:hidden; background:white;">
                            ${obtenerHtmlStickerBase()}
                        </div>`;
                }
            }

            let contenidoHoja = "";

            if (esCombo) {
                contenidoHoja = `
                    <div class="combo-container-nuevo">
                        <div class="grid-monedas" style="grid-template-columns: repeat(${colsSup}, ${diametroChico}cm); gap: ${gap}cm;">
                            ${chicosArribaHtml}
                        </div>
                        <div class="seccion-inferior-mix" style="height: 12.2cm;">
                            <div class="casilla" style="width:${diametroGrande}cm; height:${diametroGrande}cm; border-radius:50%; background:white; flex-shrink: 0;">
                                ${obtenerHtmlStickerBase()}
                            </div>
                            <div class="bloque-rectangulos" style="height: ${diametroGrande}cm; width: ${tiraAncho}cm; flex-shrink: 0;">
                                <div class="casilla" style="width:${tiraAncho}cm; height:${tiraLargo}cm; background:white;">
                                    ${obtenerHtmlStickerBase()}
                                </div>
                                <div class="casilla" style="width:${tiraAncho}cm; height:${tiraLargo}cm; background:white;">
                                    ${obtenerHtmlStickerBase()}
                                </div>
                            </div>
                            <div class="monedas-lado-derecho" style="grid-template-columns: repeat(${colsInfDerecha}, ${diametroChico}cm); gap: ${gap}cm; width: ${anchoRestanteInferior}cm; height: ${diametroGrande}cm;">
                                ${chicosAbajoDerechaHtml}
                            </div>
                        </div>
                    </div>`;
            } else {
                let totalHojasFilas = Math.floor((41.5 + gap) / (diametroChico + gap));
                let totalSoloMonedas = colsSup * totalHojasFilas;
                let soloMonedasHtml = "";
                for (let i = 0; i < totalSoloMonedas; i++) {
                    soloMonedasHtml += `
                        <div class="casilla" style="width:${diametroChico}cm; height:${diametroChico}cm; border-radius:50%; overflow:hidden; background:white;">
                            ${soloMonedasHtml}
                        </div>`;
                }
                contenidoHoja = `
                    <div class="grid-solo-monedas" style="grid-template-columns: repeat(${colsSup}, ${diametroChico}cm); gap:${gap}cm; background:${colorFondo};">
                        ${soloMonedasHtml}
                    </div>`;
            }

            htmlFinal += `<div class="hoja-tabloide portrait" style="background:${colorFondo};">${contenidoHoja}</div>`;
        }
        main.innerHTML = htmlFinal;
    }
</script>
