    let favoritas = [];
    let bloquesMap = new Map();

    function toggleMenuLateral() { document.getElementById('panel-left-sidebar').classList.toggle('oculto'); }
    function aplicarZoomPantalla(factor) { document.getElementById('main-container').style.transform = `scale(${factor})`; }
    function fallbackExtension(img, id) { if(img.src.endsWith('.jpg')) img.src = `imagenes/${id}.png`; else if(img.src.endsWith('.png')) img.src = `imagenes/${id}.jpeg`; }

    function toggleFavorita(id) {
        if (favoritas.includes(id)) { favoritas = favoritas.filter(x => x !== id); if(document.getElementById(`item-menu-${id}`)) document.getElementById(`item-menu-${id}`).classList.remove('activa'); }
        else { let maxFavs = document.getElementById('cantidadTablas').value === '10' ? 6 : 5; if (favoritas.length >= maxFavs) return alert(`Máximo ${maxFavs} favoritas.`); favoritas.push(id); if(document.getElementById(`item-menu-${id}`)) document.getElementById(`item-menu-${id}`).classList.add('activa'); }
        renderizarFavs();
    }

    function limpiarYAdaptarModo() { favoritas.forEach(id => { if(document.getElementById(`item-menu-${id}`)) document.getElementById(`item-menu-${id}`).classList.remove('activa'); }); favoritas = []; renderizarFavs(); }
    function renderizarFavs() { const contenedor = document.getElementById('fav-list-display'); contenedor.innerHTML = ''; favoritas.forEach(id => { contenedor.innerHTML += `<span style="background:#2ecc71; color:black; padding:2px 5px; border-radius:4px; font-weight:bold; font-size:11px;">#${id} <span style="cursor:pointer;color:red;" onclick="toggleFavorita(${id})">×</span></span>`; }); }
    function cambiarFondo(color) { const wrapper = document.getElementById('main-wrapper'); wrapper.style.backgroundImage = 'none'; wrapper.style.backgroundColor = color; document.getElementById('colorFondo').value = color; }
    function aplicarPatron(val) { const wrapper = document.getElementById('main-wrapper'); if(val === 'solido') cambiarFondo(document.getElementById('colorFondo').value); else if(val === 'degradadoNeón') wrapper.style.backgroundImage = 'linear-gradient(135deg, #1e1e2e 0%, #11111d 100%)'; else if(val === 'degradadoGlamour') wrapper.style.backgroundImage = 'linear-gradient(135deg, #2c3e50 0%, #000000 100%)'; else if(val === 'lineas') wrapper.style.backgroundImage = 'repeating-linear-gradient(45deg, #111 0px, #111 10px, #222 10px, #222 20px)'; }

    function construirMesaIndependiente(favsDelBloque, totalTablasAAsignar) {
        let tablas = Array.from({length: totalTablasAAsignar}, () => Array(16).fill(null));
        let primeraFav = favsDelBloque[0] || 1;
        for(let t = 0; t < totalTablasAAsignar; t++) { tablas[t][10] = primeraFav; let favAsignada = favsDelBloque[t + 1]; if (favAsignada) tablas[t][0] = favAsignada; }
        for (let t = 0; t < totalTablasAAsignar; t++) {
            let favPermitidaCero = favsDelBloque[t + 1]; let favsProhibidas = favsDelBloque.filter(f => f !== primeraFav && f !== favPermitidaCero);
            let mazoLimpio = []; for (let i = 1; i <= 54; i++) { if (!favsProhibidas.includes(i) && i !== primeraFav && i !== favPermitidaCero) mazoLimpio.push(i); }
            mazoLimpio.sort(() => Math.random() - 0.5);
            for (let c = 0; c < 16; c++) { if (tablas[t][c] === null) { let index = mazoLimpio.findIndex(carta => !tablas[t].includes(carta)); if (index !== -1) tablas[t][c] = mazoLimpio.splice(index, 1)[0]; } }
        }
        for (let t = 0; t < totalTablasAAsignar; t++) {
            let favPermitidaCero = favsDelBloque[t + 1]; let favsProhibidas = favsDelBloque.filter(f => f !== primeraFav && f !== favPermitidaCero);
            for (let c = 0; c < 16; c++) { if (tablas[t][c] === null) { let comodines = Array.from({length: 54}, (_, i) => i + 1).filter(x => !tablas[t].includes(x) && !favsProhibidas.includes(x)); comodines.sort(() => Math.random() - 0.5); tablas[t][c] = comodines.pop() || 2; } }
        }
        return tablas;
    }

    function generarSistemaModular() {
        const modo = document.getElementById('cantidadTablas').value;
        const contenedor = document.getElementById('main-container');
        const panelValidadores = document.getElementById('contenedores-validadores-dinamicos');
        const numHojas = parseInt(document.getElementById('hojasACrear').value) || 1;
        
        contenedor.className = '';
        contenedor.classList.add(modo === '10' ? 'grid-10' : 'grid-8especial_colorido');
        contenedor.innerHTML = '';
        panelValidadores.innerHTML = '';
        bloquesMap.clear();

        // Ciclo principal que genera tantas páginas independientes como pida el usuario
        for(let h = 1; h <= numHojas; h++) {
            let htmlPagina = `<div class="pagina-bloque-impresion">`;

            if (modo === '8especial_colorido') {
                let f1 = favoritas[0] || 1;
                htmlPagina += `
                    <div class="contenedor-banner-favorita">
                        <div class="banner-seccion-titulo">CENTRO</div>
                        <div class="wrapper-centro-foto">
                            <img class="img-fav-banner-nueva" src="imagenes/${f1}.jpg" onerror="fallbackExtension(this, ${f1})">
                        </div>
                        <div class="banner-seccion-titulo">ESQUINAS</div>
                        <div class="wrapper-esquinas-grid">
                `;
                for(let f = 1; f <= 4; f++) {
                    let fId = favoritas[f] || (f + 1);
                    htmlPagina += `<div class="cuadrito-esquina-foto"><img class="img-fav-banner-nueva" src="imagenes/${fId}.jpg" onerror="fallbackExtension(this, ${fId})"></div>`;
                }
                htmlPagina += `</div></div>`;

                let IDBloqueSup = (h * 2) - 1;
                let IDBloqueInf = (h * 2);
                bloquesMap.set(IDBloqueSup, new Set());
                bloquesMap.set(IDBloqueInf, new Set());

                let bloqueA = construirMesaIndependiente(favoritas, 4);
                bloqueA.forEach(t => {
                    let html = `<div class="tabla">`;
                    t.forEach(n => { bloquesMap.get(IDBloqueSup).add(n); let cls = favoritas.includes(n) ? 'es-favorita' : ''; html += `<div class="casilla ${cls}"><img class="foto" src="imagenes/${n}.jpg" onerror="fallbackExtension(this, n)"></div>`; });
                    htmlPagina += html + `</div>`;
                });

                let bloqueB = construirMesaIndependiente(favoritas, 4);
                bloqueB.forEach(t => {
                    let html = `<div class="tabla">`;
                    t.forEach(n => { bloquesMap.get(IDBloqueInf).add(n); let cls = favoritas.includes(n) ? 'es-favorita' : ''; html += `<div class="casilla ${cls}"><img class="foto" src="imagenes/${n}.jpg" onerror="fallbackExtension(this, n)"></div>`; });
                    htmlPagina += html + `</div>`;
                });

                crearNodoValidadorVisual(IDBloqueSup, `H${h} - Sup (1-4)`);
                crearNodoValidadorVisual(IDBloqueInf, `H${h} - Inf (5-8)`);

            } else if (modo === '10') {
                let f1 = favoritas[0] || 1;
                htmlPagina += `
                    <div class="contenedor-banner-horizontal">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div class="banner-seccion-titulo">CENTRO</div>
                            <div class="wrapper-centro-horizontal">
                                <img class="img-fav-banner-nueva" src="imagenes/${f1}.jpg" onerror="fallbackExtension(this, ${f1})">
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div class="banner-seccion-titulo">ESQUINAS</div>
                            <div class="wrapper-esquinas-horizontal">
                `;
                for(let f = 1; f <= 5; f++) {
                    let fId = favoritas[f] || (f + 1);
                    htmlPagina += `<div class="cuadrito-horizontal-foto"><img class="img-fav-banner-nueva" src="imagenes/${fId}.jpg" onerror="fallbackExtension(this, ${fId})"></div>`;
                }
                htmlPagina += `</div></div></div>`;

                let IDBloqueSup = (h * 2) - 1;
                let IDBloqueInf = (h * 2);
                bloquesMap.set(IDBloqueSup, new Set());
                bloquesMap.set(IDBloqueInf, new Set());

                let bloqueA = construirMesaIndependiente(favoritas, 5);
                bloqueA.forEach(t => {
                    let html = `<div class="tabla">`;
                    t.forEach(n => { bloquesMap.get(IDBloqueSup).add(n); let cls = favoritas.includes(n) ? 'es-favorita' : ''; html += `<div class="casilla ${cls}"><img class="foto" src="imagenes/${n}.jpg" onerror="fallbackExtension(this, n)"></div>`; });
                    htmlPagina += html + `</div>`;
                });

                let bloqueB = construirMesaIndependiente(favoritas, 5);
                bloqueB.forEach(t => {
                    let html = `<div class="tabla">`;
                    t.forEach(n => { bloquesMap.get(IDBloqueInf).add(n); let cls = favoritas.includes(n) ? 'es-favorita' : ''; html += `<div class="casilla ${cls}"><img class="foto" src="imagenes/${n}.jpg" onerror="fallbackExtension(this, n)"></div>`; });
                    htmlPagina += html + `</div>`;
                });

                crearNodoValidadorVisual(IDBloqueSup, `H${h} - Sup (1-5)`);
                crearNodoValidadorVisual(IDBloqueInf, `H${h} - Inf (6-10)`);
            }

            htmlPagina += `</div>`;
            contenedor.innerHTML += htmlPagina;
        }
    }

    function crearNodoValidadorVisual(numBloque, etiquetaTitulo) {
        const panelValidadores = document.getElementById('contenedores-validadores-dinamicos'); const setDeCartas = bloquesMap.get(numBloque); const totalCartasUnicas = setDeCartas.size; const badgeClass = totalCartasUnicas >= 54 ? "badge-ok" : "badge-fail"; const badgeTexto = totalCartasUnicas >= 54 ? "✓ OK" : `FALTAN ${54 - totalCartasUnicas}`;
        let htmlValidador = `<div class="bloque-validador"><div class="titulo-bloque">${etiquetaTitulo}</div><div class="kpi-bloque">Unicas: ${totalCartasUnicas} / 54</div><div class="status-badge ${badgeClass}">${badgeTexto}</div><div class="grid-mini-cartas">`;
        for (let i = 1; i <= 54; i++) { let cls = favoritas.includes(i) ? 'c-fav' : (setDeCartas.has(i) ? 'c-ok' : 'c-no'); htmlValidador += `<div class="mini-c ${cls}">${i}</div>`; }
        htmlValidador += `</div></div>`; panelValidadores.innerHTML += htmlValidador;
    }
</script>
</body>
</html>
