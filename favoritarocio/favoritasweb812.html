        .grid-mini-cartas { display: grid; grid-template-columns: repeat(9, 1fr); gap: 2px; background: #0f0f1a; padding: 4px; border-radius: 4px; max-height: 90px; overflow-y: auto; }

        .c-fav { background: #2ecc71; color: #000; }

        .c-no { background: #e74c3c; }

        /* MEDIDAS AJUSTADAS DE LAS TABLAS (REDUCCIÓN VERTICAL EXTRA ANTI-SALTOS) */
        .tabla { background: #ffffff !important; display: grid; grid-template-columns: repeat(4, 25%); grid-template-rows: repeat(4, 25%); border: 1px solid #000; width: 8cm; height: 12.0cm; }
        .casilla { background: #ffffff !important; border: 0.5px solid #ccc; overflow: hidden; position: relative; }
        .foto { width: 100%; height: 100%; object-fit: fill; display: block; }
        .casilla.es-favorita { box-shadow: inset 0 0 0 2px #2ecc71 !important; border: 2px solid #2ecc71 !important; z-index: 10; }
        
        /* BLOQUE POR HOJA FISICA */
        .pagina-bloque-impresion { display: grid; gap: 4mm; background-color: transparent; box-sizing: border-box; width: 100% !important; align-content: center; justify-content: center; margin: 0 auto; padding: 5px; page-break-inside: avoid; break-inside: avoid; page-break-after: always; break-after: always; }

        .grid-8especial_colorido { grid-template-columns: 8cm repeat(4, 8cm); grid-template-rows: repeat(2, 12.0cm); }
        .grid-8especial_colorido .contenedor-banner-favorita { grid-column: 1; grid-row: 1 / span 2; }

        /* MODIFICADO: Ajustado para 2 filas de 5 tablas pura y dura sin banners */

        .cuadrito-horizontal-foto { border: 2px solid #fff; border-radius: 6px; overflow: hidden; background: #fff; width: 1.1cm; height: 1.6cm; }
        .img-fav-banner-nueva { width: 100%; height: 100%; object-fit: fill; }

<script>
    let favoritas = [];
    let bloquesMap = new Map();

    function toggleMenuLateral() { document.getElementById('panel-left-sidebar').classList.toggle('oculto'); }
    function aplicarZoomPantalla(factor) { document.getElementById('main-container').style.transform = `scale(${factor})`; }
    function fallbackExtension(img, id) { if(img.src.endsWith('.jpg')) img.src = `imagenes/${id}.png`; else if(img.src.endsWith('.png')) img.src = `imagenes/${id}.jpeg`; }

    function toggleFavorita(id) {
        if (favoritas.includes(id)) { favoritas = favoritas.filter(x => x !== id); if(document.getElementById(`item-menu-${id}`)) document.getElementById(`item-menu-${id}`).classList.remove('activa'); }
        else { let maxFavs = document.getElementById('cantidadTablas').value === '10' ? 6 : 5; if (favoritas.length >= maxFavs) return alert(`Máximo ${maxFavs} favoritas.`); favoritas.push(id); if(document.getElementById(`item-menu-${id}`)) document.getElementById(`item-menu-${id}`).classList.add('activa'); }
        renderizarFavs();
    }

    function limpiarYAdaptarModo() { favoritas.forEach(id => { if(document.getElementById(`item-menu-${id}`)) document.getElementById(`item-menu-${id}`).classList.remove('activa'); }); favoritas = []; renderizarFavs(); }
