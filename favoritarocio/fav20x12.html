<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Master - Sistema Modular de Lotería Profesional (20 Tablas)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box !important; margin: 0; padding: 0; }
        body { background-color: #ffffff; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* PANEL IZQUIERDO: CONTROLES PREMIUM */
        .panel-left { width: 320px; background: #1a1a26; padding: 20px; border-right: 3px solid #3498db; overflow-y: auto; color: #e2e8f0; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 4px 0 15px rgba(0,0,0,0.3); }
        .panel-left.oculto { margin-left: -320px; }
        
        .logo-gallo { width: 80px; height: 80px; background: #e74c3c; border-radius: 50%; margin: 0 auto 5px; position: relative; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .logo-gallo::after { content: '🐓'; font-size: 48px; position: absolute; top: 4px; left: 13px; }
        
        .seccion-control { display: flex; flex-direction: column; gap: 6px; background: #222235; padding: 12px; border-radius: 8px; border: 1px solid #2d2d44; }
        .seccion-control label { font-size: 12px; font-weight: 600; color: #3498db; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .panel-left select, .panel-left input[type="number"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #3d3d5c; background: #151522; color: #fff; font-size: 13px; font-weight: bold; outline: none; transition: border 0.2s; }
        
        .btn-primario { background: #3498db; color: white; border: none; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
        .btn-primario:hover { background: #2980b9; }
        .btn-descargar { background: #2ecc71; color: white; border: none; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
        .btn-descargar:hover { background: #27ae60; }

        .menu-visual { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-height: 200px; overflow-y: auto; background: #11111a; padding: 10px; border-radius: 8px; border: 1px solid #2d2d44; }
        .item-carta { cursor:pointer; text-align:center; background:#252538; padding:6px; border-radius:6px; border: 1px solid #3d3d5c; transition: all 0.2s; position: relative; }
        .item-carta img { width: 100%; height: 50px; display: block; margin: 0 auto 4px; object-fit: cover; border-radius: 4px; }
        .item-carta.activa { border: 2px solid #2ecc71 !important; background: #163f2d !important; }
        
        .grid-colores { display: flex; gap: 8px; align-items: center; }
        .btn-color-fast { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }

        /* PANEL CENTRAL RESPONSIVO */
        #main-wrapper { flex-grow: 1; display: flex; flex-direction: column; background-color: #000000; height: 100vh; overflow: hidden; position: relative; }
        .btn-floating-menu { position: absolute; top: 15px; left: 15px; z-index: 99; background: #3498db; color: white; border: none; width: 40px; height: 40px; font-size: 20px; cursor: pointer; border-radius: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        /* ÁREA DE TRABAJO EN PANTALLA */
        #zoom-container { flex-grow: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; width: 100%; }
        
        /* CONTENEDOR DE RENDERIZADO CORREGIDO */
        #area-render-pdf { background-color: #000000; padding: 0; margin: 0; width: auto; height: auto; display: block; }
        #main-container { display: flex; flex-direction: column; transition: transform 0.2s ease; transform-origin: top center; background-color: transparent; margin: 0; padding: 0; }

        /* PANEL DERECHO DE MONITOREO */
        .panel-right { width: 280px; background: #1a1a26; padding: 15px; border-left: 3px solid #3498db; overflow-y: auto; color: white; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }
        .bloque-validador { background: #11111a; padding: 10px; border-radius: 8px; border: 1px solid #f1c40f; margin-bottom: 5px; }
        .titulo-bloque { font-size: 12px; font-weight: bold; text-align: center; margin-bottom: 5px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .grid-mini-cartas { display: grid; grid-template-columns: repeat(9, 1fr); gap: 2px; background: #05050a; padding: 4px; border-radius: 4px; max-height: 90px; overflow-y: auto; }
        .mini-c { text-align: center; font-size: 8px; font-weight: bold; padding: 1px 0; border-radius: 1px; color: #fff; }
        .c-fav { background: #2ecc71; color: #000; }
        .c-ok { background: #3498db; }
        .c-no { background: #e74c3c; }

        /* CONFIGURACIÓN INTERNA DE TABLAS */
        .tabla { background: #ffffff !important; display: grid; grid-template-columns: repeat(4, 25%); grid-template-rows: repeat(4, 25%); border: 1.5px solid #000; }
        .casilla { background: #ffffff !important; border: 0.5px solid #bbb; overflow: hidden; position: relative; }
        .foto { width: 100%; height: 100%; object-fit: fill; display: block; }
        .casilla.es-favorita { box-shadow: inset 0 0 0 2px #2ecc71 !important; border: 2px solid #2ecc71 !important; z-index: 10; }
        
        /* CONTENEDOR FÍSICO ESTRICTO POR HOJA LEDGER */
        .pagina-bloque-impresion { 
            display: grid; 
            grid-template-columns: repeat(4, 5.2cm); 
            grid-template-rows: auto repeat(5, 7.8cm); 
            gap: 3.5mm; 
            padding: 10px; 
            width: 23.5cm !important; 
            background-color: transparent; 
            box-sizing: border-box; 
            align-content: center; 
            justify-content: center; 
            margin: 0 auto; 
            page-break-inside: avoid; 
            break-inside: avoid; 
            page-break-after: always; 
            break-after: always;
        }

        .pagina-bloque-impresion .tabla { width: 5.2cm; height: 7.8cm; }
        .pagina-bloque-impresion .banner-superior-circulos { grid-column: 1 / span 4; grid-row: 1; }

        /* BANNER SUPERIOR OPTIMIZADO (SIN PALABRAS Y CON MENOS ESPACIO) */
        .banner-superior-circulos { background: #0070f3 !important; border: 3px solid #ffffff; border-radius: 12px; padding: 4px 12px; display: flex; flex-direction: column; align-items: center; gap: 0; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); width: 100%; }
        .contenedor-flex-circulos { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 5px; }
        .circulo-preferida { width: 1.2cm; height: 1.2cm; border-radius: 50%; border: 2px solid #ffffff; overflow: hidden; background: #ffffff; box-shadow: 0 2px 5px rgba(0,0,0,0.4); flex-shrink: 0; }
        .circulo-preferida img { width: 100%; height: 100%; object-fit: cover; }

        @media (max-width: 1024px) { .panel-right { display: none; } }
    </style>
</head>
<body>

<div class="panel-left" id="panel-left-sidebar">
    <div style="text-align:center;"> 
        <div class="logo-gallo"></div> 
        <h2 style="margin:8px 0 0 0; font-size:18px; color:#fff; letter-spacing: 0.5px;">Ing. Aldo Salazar</h2>
        <span style="font-size: 11px; color: #3498db; font-weight: bold;">IT & Design Custom System</span>
    </div>
    
    <div class="seccion-control">
        <label>Modalidad de Tablas</label>
        <select id="cantidadTablas" disabled>
            <option value="20_vertical" selected>20 Tablas Estrictas 🌟</option>
        </select>
    </div>

    <div class="seccion-control">
        <label>Selección Visual de Favoritas</label>
        <div class="menu-visual" id="grid-seleccion-visual">
            <script>
                for(let i=1; i<=54; i++) {
                    document.write(`<div class="item-carta" id="item-menu-${i}" onclick="toggleFavorita(${i})"><img src="imagenes/${i}.jpg" onerror="fallbackExtension(this, ${i})"><span style="font-size:10px; color:#3498db; font-weight:bold;">#${i}</span></div>`);
                }
            </script>
        </div>
    </div>
    
    <div class="seccion-control">
        <label>Favoritas en Memoria</label>
        <div id="fav-list-display"></div>
    </div>
    
    <div class="seccion-control">
        <label>Hojas a Generar</label>
        <input type="number" id="hojasACrear" value="1" min="1" max="10">
    </div>

    <div class="seccion-control">
        <label>Zoom Vista de Pantalla</label>
        <select id="zoomSelector" onchange="aplicarZoomPantalla(this.value)">
            <option value="0.35" selected>35% (Vista General)</option>
            <option value="0.5">50%</option>
            <option value="0.75">75%</option>
            <option value="1.0">100%</option>
        </select>
    </div>

    <div class="seccion-control">
        <label>Color y Patrón de Fondo</label>
        <div class="grid-colores">
            <button class="btn-color-fast" style="background: #000000;" onclick="cambiarFondo('#000000')"></button>
            <button class="btn-color-fast" style="background: #1a1a2e;" onclick="cambiarFondo('#1a1a2e')"></button>
            <button class="btn-color-fast" style="background: #ffffff; border-color: #ccc;" onclick="cambiarFondo('#ffffff')"></button>
            <input type="color" id="colorFondo" value="#000000" style="width:40px; height:30px; border:none; padding:0; background:none; cursor:pointer;" oninput="cambiarFondo(this.value)">
        </div>
        <select id="patronSeleccionado" onchange="aplicarPatron(this.value)" style="margin-top: 8px;">
            <option value="solido">Fondo Liso</option>
            <option value="degradadoNeón">🌌 Espacio Profundo</option>
            <option value="degradadoGlamour">✨ Degradado Ejecutivo</option>
            <option value="lineas">📐 Cuadrícula Técnica</option>
        </select>
    </div>

    <button class="btn-primario" onclick="generarSistemaModular()">PROCESAR MAZO</button>
    <button class="btn-descargar" onclick="exportarSetAPDFReal()">DESCARGAR PDF REAL</button>
</div>

<div id="main-wrapper">
    <button class="btn-floating-menu" onclick="toggleMenuLateral()" title="Mostrar/Ocultar Menú">☰</button>
    
    <div id="zoom-container">
        <div id="area-render-pdf">
            <div id="main-container"></div>
        </div>
    </div>
</div>

<div class="panel-right" id="panel-validador-derecho">
    <h2 style="font-size:13px; text-align:center; color:#f1c40f; margin:0; padding-bottom:8px; border-bottom:1px dashed #3498db; letter-spacing: 1px;">MONITOR DE MAZO</h2>
    <div id="contenedores-validadores-dinamicos"></div>
</div>

<script>
    let favoritas = [];
    let bloquesMap = new Map();

    function toggleMenuLateral() { document.getElementById('panel-left-sidebar').classList.toggle('oculto'); }
    function aplicarZoomPantalla(factor) { document.getElementById('main-container').style.transform = `scale(${factor})`; }
    function fallbackExtension(img, id) { if(img.src.endsWith('.jpg')) img.src = `imagenes/${id}.png`; else if(img.src.endsWith('.png')) img.src = `imagenes/${id}.jpeg`; }

    function toggleFavorita(id) {
        let maxFavs = 12;
        if (favoritas.includes(id)) { 
            favoritas = favoritas.filter(x => x !== id); 
            if(document.getElementById(`item-menu-${id}`)) document.getElementById(`item-menu-${id}`).classList.remove('activa'); 
        } else { 
            if (favoritas.length >= maxFavs) return alert(`La modalidad seleccionada acepta un máximo de ${maxFavs} favoritas.`); 
            favoritas.push(id); 
            if(document.getElementById(`item-menu-${id}`)) document.getElementById(`item-menu-${id}`).classList.add('activa'); 
        }
        renderizarFavs();
    }

    function renderizarFavs() { 
        const contenedor = document.getElementById('fav-list-display'); 
        contenedor.innerHTML = ''; 
        if(favoritas.length === 0) { contenedor.innerHTML = '<span style="font-size:11px; color:#666; font-style:italic;">Ninguna seleccionada</span>'; return; }
        favoritas.forEach(id => { 
            contenedor.innerHTML += `<span style="background:#2ecc71; color:black; padding:4px 6px; border-radius:4px; font-weight:bold; font-size:11px; display:inline-flex; align-items:center; gap:5px;">#${id} <span style="cursor:pointer;color:#c0392b;font-weight:900;" onclick="toggleFavorita(${id})">×</span></span>`; 
        }); 
    }
    
    function cambiarFondo(color) { 
        const wrapper = document.getElementById('main-wrapper'); 
        const areaPdf = document.getElementById('area-render-pdf');
        wrapper.style.backgroundImage = 'none'; wrapper.style.backgroundColor = color; 
        areaPdf.style.backgroundImage = 'none'; areaPdf.style.backgroundColor = color;
        document.getElementById('colorFondo').value = color; 
    }
    
    function aplicarPatron(val) { 
        const wrapper = document.getElementById('main-wrapper'); 
        const areaPdf = document.getElementById('area-render-pdf');
        let bgStyle = '';
        if(val === 'solido') { cambiarFondo(document.getElementById('colorFondo').value); return; }
        else if(val === 'degradadoNeón') bgStyle = 'linear-gradient(135deg, #1e1e2e 0%, #11111d 100%)';
        else if(val === 'degradadoGlamour') bgStyle = 'linear-gradient(135deg, #2c3e50 0%, #000000 100%)';
        else if(val === 'lineas') bgStyle = 'repeating-linear-gradient(45deg, #111 0px, #111 10px, #222 10px, #222 20px)';
        
        wrapper.style.backgroundImage = bgStyle;
        areaPdf.style.backgroundImage = bgStyle;
    }

    function exportarSetAPDFReal() {
        const elementoAEmitir = document.getElementById('area-render-pdf');
        
        const opcionesConfig = {
            margin:       0,
            filename:     `loteria_modular_20_tablas.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, backgroundColor: null, scrollY: 0 }, 
            jsPDF:        { unit: 'in', format: 'ledger', orientation: 'portrait' }
        };
        html2pdf().set(opcionesConfig).from(elementoAEmitir).save();
    }

    function construirMesaTotalmenteAleatoria20(favsSeleccionadas) {
        let tablas = Array.from({length: 20}, () => Array(16).fill(null));
        
        for(let t = 0; t < 20; t++) {
            let posicionesDisponibles = Array.from({length: 16}, (_, i) => i);
            posicionesDisponibles.sort(() => Math.random() - 0.5);
            
            favsSeleccionadas.forEach(favId => {
                if(posicionesDisponibles.length > 0) {
                    let posElegida = posicionesDisponibles.pop();
                    tablas[t][posElegida] = favId;
                }
            });
            
            let mazoLimpio = [];
            for(let i = 1; i <= 54; i++) {
                if(!tablas[t].includes(i)) {
                    mazoLimpio.push(i);
                }
            }
            mazoLimpio.sort(() => Math.random() - 0.5);
            
            for(let c = 0; c < 16; c++) {
                if(tablas[t][c] === null) {
                    tablas[t][c] = mazoLimpio.pop();
                }
            }
        }
        return tablas;
    }

    function generarSistemaModular() {
        const contenedor = document.getElementById('main-container');
        const panelValidadores = document.getElementById('contenedores-validadores-dinamicos');
        const numHojas = parseInt(document.getElementById('hojasACrear').value) || 1;
        
        contenedor.innerHTML = '';
        panelValidadores.innerHTML = '';
        bloquesMap.clear();

        for(let h = 1; h <= numHojas; h++) {
            let htmlPagina = `<div class="pagina-bloque-impresion">`;
            
            htmlPagina += `
                <div class="banner-superior-circulos">
                    <div class="contenedor-flex-circulos">
            `;
            for(let c = 0; c < 12; c++) {
                let favId = favoritas[c] || (c + 1);
                htmlPagina += `<div class="circulo-preferida" title="Favorita #${favId}"><img src="imagenes/${favId}.jpg" onerror="fallbackExtension(this, ${favId})"></div>`;
            }
            htmlPagina += `</div></div>`;

            let IDBloqueUnico = h;
            bloquesMap.set(IDBloqueUnico, new Set());

            let mazoCompleto20 = construirMesaTotalmenteAleatoria20(favoritas);
            mazoCompleto20.forEach(t => {
                let html = `<div class="tabla">`;
                t.forEach(n => { 
                    bloquesMap.get(IDBloqueUnico).add(n); 
                    let cls = favoritas.includes(n) ? 'es-favorita' : ''; 
                    html += `<div class="casilla ${cls}"><img class="foto" src="imagenes/${n}.jpg" onerror="fallbackExtension(this, n)"></div>`; 
                });
                htmlPagina += html + `</div>`;
            });

            htmlPagina += `</div>`;
            contenedor.innerHTML += htmlPagina;
            crearNodoValidadorVisual(IDBloqueUnico, `Hoja ${h} (1-20)`);
        }
    }

    function crearNodoValidadorVisual(numBloque, etiquetaTitulo) {
        const panelValidadores = document.getElementById('contenedores-validadores-dinamicos'); 
        const setDeCartas = bloquesMap.get(numBloque); 
        const totalCartasUnicas = setDeCartas ? setDeCartas.size : 0; 
        
        let htmlValidador = `
            <div class="bloque-validador">
                <div class="titulo-bloque">${etiquetaTitulo}</div>
                <div style="font-size:11px; text-align:center; margin-bottom:4px;">Únicas: <b style="color:#2ecc71;">${totalCartasUnicas}</b> / 54</div>
                <div class="grid-mini-cartas">
        `;
        for (let i = 1; i <= 54; i++) { 
            let cls = favoritas.includes(i) ? 'c-fav' : ((setDeCartas && setDeCartas.has(i)) ? 'c-ok' : 'c-no'); 
            htmlValidador += `<div class="mini-c ${cls}">${i}</div>`; 
        }
        htmlValidador += `</div></div>`; 
        panelValidadores.innerHTML += htmlValidador;
    }
</script>
</body>
</html>
</body>
</html>
