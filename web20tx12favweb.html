<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotería Monumental - Ultra Velocidad Tabloide ⚡</title>
    <style>
        /* --- ESTILOS EN PANTALLA (INTERFAZ WEB / CELULAR) --- */
        body { font-family: sans-serif; padding: 20px; background: #fafafa; margin: 0; }
        section { background: white; padding: 20px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 8px; }
        
        .grid-fotos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
            gap: 10px; 
            margin-top: 10px; 
        }
        
        .grid-fotos .card-mock, .grid-fotos img { 
            width: 100%; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            border: 2px solid #ccc; 
            cursor: pointer; 
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            box-sizing: border-box;
        }
        
        .grid-fotos .seleccionada { 
            border: 5px solid #e63946 !important; 
            box-shadow: 0 0 10px rgba(230,57,70,0.6);
        }

        .wrapper-vista-previa {
            width: 100%;
            overflow-x: auto;
            padding: 10px;
            background: #ddd;
            border-radius: 8px;
        }

        .panel-auditoria {
            background: #1e293b; color: #f8fafc; padding: 15px; border-radius: 6px; margin-bottom: 15px; font-family: monospace;
        }
        .panel-auditoria h3 { margin-top: 0; color: #38bdf8; }
        .status-item { margin-bottom: 5px; display: flex; justify-content: space-between; border-bottom: 1px dashed #334155; padding-bottom: 4px; }
        .badge-ok { color: #4ade80; font-weight: bold; }

        /* Contenedor visual en pantalla */
        #hoja-tabloide {
            width: 1056px;  
            height: 1632px; 
            background: #fff; 
            padding: 15px; 
            box-sizing: border-box;  
            position: relative;
        }

        .pliego-monumental {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            grid-template-rows: repeat(20, 1fr);
            gap: 2px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .celda-carta {
            background: #fff;
            position: relative;
            box-sizing: border-box;
            border: 0.5px solid #bbb;
        }

        .celda-carta img, .celda-carta .mock-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .celda-carta .mock-img {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: normal;
            color: #333;
            font-size: 10px;
            background: #fff;
        }

        .borde-top { border-top: 3px solid #000 !important; }
        .borde-left { border-left: 3px solid #000 !important; }
        .borde-right { border-right: 3px solid #000 !important; }
        .borde-bottom { border-bottom: 3px solid #000 !important; }

        .celda-carta.favorita-grande {
            grid-column: span 2;
            grid-row: span 2;
            border: 4px solid blue !important;  
            z-index: 10;
        }
        
        .celda-carta.favorita-grande .mock-img {
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px #000;
        }

        .panel-botones { display: flex; gap: 10px; margin-top: 1rem; }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-success { background-color: #2a9d8f; color: white; }
        .btn-print { background-color: #10b981; color: white; }
        .btn-jpg { background-color: #f4a261; color: white; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* --- CONTROL ESTRICTO DE IMPRESIÓN --- */
        @media print {
            h1, section:nth-of-type(1), section:nth-of-type(2), section:nth-of-type(3), .panel-botones, h2, .wrapper-vista-previa-label {
                display: none !important;
            }
            
            .wrapper-vista-previa {
                padding: 0 !important;
                background: none !important;
                overflow: visible !important;
            }

            @page {
                size: 11in 17in;
                margin: 0;
            }
            
            html, body {
                width: 11in;
                height: 17in;
                background: #fff;
                overflow: hidden;
                padding: 0 !important;
                margin: 0 !important;
            }

            #hoja-tabloide {
                display: block !important;
                width: 11in !important;
                height: 17in !important;
                margin: 0 !important;
                padding: 15px !important; 
                box-sizing: border-box !important;
                page-break-inside: avoid;
                position: absolute;
                top: 0;
                left: 0;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>

    <h1>Generador de Lotería Monumental - Servidor Web</h1>

    <section>
        <h2>1. Control de Carga e Imágenes</h2>
        <input type="file" id="input-archivos" multiple accept="image/*">
        <div class="panel-botones">
            <button id="btn-mock" class="btn-primary">⚡ Carga Rápida Automática (Prueba)</button>
        </div>
        <p>Imágenes procesadas y optimizadas: <strong id="total-subidas">0</strong></p>
    </section>

    <section>
        <h2>2. Tus 12 Favoritas Seleccionadas (<span id="contador-favoritas">0</span> / 12)</h2>
        <div id="contenedor-seleccion" class="grid-fotos"></div>
        <br>
        <button id="btn-generar" class="btn-success" disabled>Generar Pliego Definitivo</button>
    </section>

    <section>
        <h2>3. Panel de Revisión de Reglas</h2>
        <div id="panel-vigilancia" class="panel-auditoria">
            [Esperando generación del pliego...]
        </div>
    </section>

    <section>
        <h2 class="wrapper-vista-previa-label">4. Pliego Estructurado Ajustado (Tabloide 11x17)</h2>
        <div class="panel-botones" style="margin-bottom: 15px;">
            <button id="btn-imprimir" class="btn-print" style="display:none;">🖨 Imprimir Pliego (Guardar como PDF)</button>
            <button id="btn-jpg" class="btn-jpg" style="display:none;">🖼 Descargar Pliego (JPG)</button>
        </div>
        
        <div class="wrapper-vista-previa">
            <div id="hoja-tabloide">
                <div id="pliego-resultado" class="pliego-monumental"></div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        let misFotos = []; 
        let favorites = [];

        const inputArchivos = document.getElementById('input-archivos');
        const btnMock = document.getElementById('btn-mock');
        const contenedorSeleccion = document.getElementById('contenedor-seleccion');
        const contadorFavoritas = document.getElementById('contador-favoritas');
        const btnGenerar = document.getElementById('btn-generar');
        const pliegoResultado = document.getElementById('pliego-resultado');
        const hojaTabloide = document.getElementById('hoja-tabloide');
        const btnImprimir = document.getElementById('btn-imprimir');
        const btnJpg = document.getElementById('btn-jpg');
        const panelVigilancia = document.getElementById('panel-vigilancia');

        function resetPrueba() {
            misFotos.forEach(foto => {
                if (!foto.isMock && foto.src.startsWith('blob:')) {
                    URL.revokeObjectURL(foto.src);
                }
            });

            misFotos = []; favorites = [];
            contenedorSeleccion.innerHTML = ''; pliegoResultado.innerHTML = '';
            btnGenerar.disabled = true; btnImprimir.style.display = 'none'; btnJpg.style.display = 'none';
            hojaTabloide.style.display = 'none';
            contadorFavoritas.innerText = "0";
            panelVigilancia.innerHTML = '[Esperando generación del pliego...]';
        }

        function toggleFavorita(elemento, fotoObj) {
            const yaEsFavorita = favorites.some(f => f.id === fotoObj.id);
            if (yaEsFavorita) {
                elemento.classList.remove('seleccionada');
                favorites = favorites.filter(f => f.id !== fotoObj.id);
            } else {
                if (favorites.length < 12) {
                    elemento.classList.add('seleccionada');
                    favorites.push(fotoObj);
                }
            }
            contadorFavoritas.innerText = favorites.length;
            btnGenerar.disabled = (favorites.length !== 12);
        }

        btnMock.addEventListener('click', function() {
            resetPrueba();
            document.getElementById('total-subidas').innerText = "54";
            
            for (let i = 1; i <= 54; i++) {
                const randomColor = `hsl(${(i * 24) % 360}, 65%, 45%)`;
                const fotoObj = { id: i, src: randomColor, isMock: true };
                misFotos.push(fotoObj);

                const div = document.createElement('div');
                div.className = 'card-mock';
                div.style.backgroundColor = randomColor;
                div.innerText = `Carta ${i}`;
                
                if (i <= 12) {
                    div.classList.add('seleccionada');
                    favorites.push(fotoObj);
                }

                div.addEventListener('click', function() { toggleFavorita(div, fotoObj); });
                contenedorSeleccion.appendChild(div);
            }
            contadorFavoritas.innerText = favorites.length;
            btnGenerar.disabled = false;
        });

        inputArchivos.addEventListener('change', function(e) {
            resetPrueba();
            const archivos = Array.from(e.target.files);
            let procesados = 0;
            
            archivos.forEach((archivo, index) => {
                const urlBlobOriginal = URL.createObjectURL(archivo);
                const imgPrevia = new Image();
                
                imgPrevia.onload = function() {
                    const anchoDestino = 300;
                    const altoDestino = 450;
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = anchoDestino;
                    canvas.height = altoDestino;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.drawImage(imgPrevia, 0, 0, anchoDestino, altoDestino);
                    
                    canvas.toBlob(function(blobComprimido) {
                        const urlBlobLiviano = URL.createObjectURL(blobComprimido);
                        const fotoObj = { id: index + 1, src: urlBlobLiviano, isMock: false };
                        misFotos.push(fotoObj);
                        
                        const imgNodo = document.createElement('img');
                        imgNodo.src = urlBlobLiviano;
                        imgNodo.addEventListener('click', function() { toggleFavorita(imgNodo, fotoObj); });
                        contenedorSeleccion.appendChild(imgNodo);
                        
                        procesados++;
                        document.getElementById('total-subidas').innerText = procesados;
                        
                        URL.revokeObjectURL(urlBlobOriginal);
                    }, 'image/jpeg', 0.85);
                };
                imgPrevia.src = urlBlobOriginal;
            });
        });

        btnGenerar.addEventListener('click', function() {
            pliegoResultado.innerHTML = '';
            btnImprimir.style.display = 'inline-block';
            btnJpg.style.display = 'inline-block'; // Mostramos el botón de JPG
            hojaTabloide.style.display = 'block';

            const fragmentoVirtual = document.createDocumentFragment();
            const comunesBase = misFotos.filter(f => !favorites.some(fav => fav.id === f.id));
            const favsMezcladas = [...favorites].sort(() => Math.random() - 0.5);

            const coordenadasBloques = [
                { r: 4, c: 4 },  { r: 4, c: 8 },  { r: 4, c: 12 },
                { r: 8, c: 4 },  { r: 8, c: 8 },  { r: 8, c: 12 },
                { r: 12, c: 4 }, { r: 12, c: 8 }, { r: 12, c: 12 },
                { r: 16, c: 4 }, { r: 16, c: 8 }, { r: 16, c: 12 }
            ];

            let poolComunGlobal = [
                ...[...comunesBase].sort(() => Math.random() - 0.5),
                ...[...comunesBase].sort(() => Math.random() - 0.5)
            ];

            let contenidoTablas = [];
            for (let t = 0; t < 20; t++) {
                contenidoTablas.push([]);
            }

            let mapeoFavoritasGrandesPorCelda = {};
            let indexFavGrande = 0;
            
            for (let r = 1; r <= 20; r++) {
                for (let c = 1; c <= 16; c++) {
                    const inicioBloque = coordenadasBloques.find(pos => pos.r === r && pos.c === c);
                    if (inicioBloque) {
                        const itemFav = favsMezcladas[indexFavGrande % favsMezcladas.length];
                        indexFavGrande++;
                        for (let br = r; br < r + 2; br++) {
                            for (let bc = c; bc < c + 2; bc++) {
                                mapeoFavoritasGrandesPorCelda[`${br}_${bc}`] = itemFav;
                            }
                        }
                    }
                }
            }

            for (let t = 0; t < 20; t++) {
                const tX = Math.floor(t / 4);
                const tY = t % 4;
                
                let favGrandeDeEstaTabla = null;
                for (let r = tX * 4 + 1; r <= (tX + 1) * 4; r++) {
                    for (let c = tY * 4 + 1; c <= (tY + 1) * 4; c++) {
                        if (mapeoFavoritasGrandesPorCelda[`${r}_${c}`]) {
                            favGrandeDeEstaTabla = mapeoFavoritasGrandesPorCelda[`${r}_${c}`];
                        }
                    }
                }

                let lasOtras11 = favorites.filter(f => f.id !== (favGrandeDeEstaTabla ? favGrandeDeEstaTabla.id : null));
                let comunesDeEstaTabla = [];
                for (let i = 0; i < 4; i++) {
                    let cartaComun = poolComunGlobal.shift();
                    if (cartaComun) comunesDeEstaTabla.push(cartaComun);
                }

                contenidoTablas[t] = [...lasOtras11, ...comunesDeEstaTabla].sort(() => Math.random() - 0.5);
            }

            let indexFavGrandeRender = 0;
            let conteoComunesUnicas = new Set();

            for (let r = 1; r <= 20; r++) {
                for (let c = 1; c <= 16; c++) {
                    
                    const tablaX = Math.floor((r - 1) / 4);
                    const tablaY = Math.floor((c - 1) / 4);
                    const numeroDeTabla = (tablaX * 4) + tablaY;

                    const inicioBloque = coordenadasBloques.find(pos => pos.r === r && pos.c === c);
                    
                    if (inicioBloque) {
                        const celda = document.createElement('div');
                        celda.className = 'celda-carta favorita-grande';
                        const item = favsMezcladas[indexFavGrandeRender % favsMezcladas.length];
                        indexFavGrandeRender++;
                        inyectarContenido(celda, item, true);
                        fragmentoVirtual.appendChild(celda);
                    } 
                    
                    const celdaOcupada = coordenadasBloques.some(pos => 
                        (r >= pos.r && r < pos.r + 2) && (c >= pos.c && c < pos.c + 2)
                    );

                    if (!celdaOcupada) {
                        const celda = document.createElement('div');
                        celda.className = 'celda-carta';
                        
                        if (c === 1 || c === 5 || c === 9 || c === 13) celda.classList.add('borde-left');
                        if (c === 4 || c === 8 || c === 12 || c === 16) celda.classList.add('borde-right');
                        if (r === 1 || r === 5 || r === 9 || r === 13 || r === 17) celda.classList.add('borde-top');
                        if (r === 4 || r === 8 || r === 12 || r === 16 || r === 20) celda.classList.add('borde-bottom');

                        const item = contenidoTablas[numeroDeTabla].shift() || misFotos[0];
                        if (!favorites.some(f => f.id === item.id)) {
                            conteoComunesUnicas.add(item.id);
                        }

                        inyectarContenido(celda, item, false);
                        fragmentoVirtual.appendChild(celda);
                    }
                }
            }

            pliegoResultado.appendChild(fragmentoVirtual);

            panelVigilancia.innerHTML = `
                <h3>PANEL DE REVISIÓN DE REGLAS (AUDITORÍA DIGITAL)</h3>
                <div class="status-item"><span>Presencia de las 12 Favoritas por Tabla:</span><span class="badge-ok">1 Grande en Cruce + 11 Chicas en casillas (12/12) ✔</span></div>
                <div class="status-item"><span>Barrido Completo del Álbum Común:</span><span class="badge-ok">${conteoComunesUnicas.size} / 42 Cartas Comunes Jugadas (100%) ✔</span></div>
                <div class="status-item"><span>Control Antiduplicados Internos:</span><span class="badge-ok">0 Figuras Repetidas por Tabla ✔</span></div>
                <div class="status-item"><span>Rotación de Baraja en el Pliego:</span><span class="badge-ok">Baraja completada en Tabla 11 y Reiniciada para Tabla 12-20 ✔</span></div>
            `;
        });

        function inyectarContenido(contenedor, item, esGrande) {
            if (item.isMock) {
                const inner = document.createElement('div');
                inner.className = 'mock-img';
                if (esGrande) {
                    inner.style.backgroundColor = item.src;
                    inner.innerText = `FAV\n${item.id}`;
                } else {
                    inner.innerText = `FAV-${item.id}`;
                }
                contenedor.appendChild(inner);
            } else {
                contenedor.style.backgroundImage = `url('${item.src}')`;
                contenedor.style.backgroundPosition = 'center';
                contenedor.style.backgroundSize = 'cover';
                contenedor.style.backgroundRepeat = 'no-repeat';
                contenedor.innerHTML = ''; 
            }
        }

        btnImprimir.addEventListener('click', function() {
            window.print();
        });

        // --- NUEVA LOGICA: DESCARGAR PLIEGO COMPLETO COMO JPG DE ALTA VELOCIDAD ---
        btnJpg.addEventListener('click', function() {
            const objetivo = document.getElementById('hoja-tabloide');
            
            // Deshabilitamos temporalmente el botón para evitar doble clic erróneo
            btnJpg.disabled = true;
            btnJpg.innerText = "⏳ Procesando Gráficos...";

            // Forzamos configuraciones óptimas en html2canvas para que no rompa la red simétrica
            html2canvas(objetivo, {
                scale: 2,               // Doble resolución para conservar nitidez al imprimir el JPG
                useCORS: true,          // Habilita la lectura de recursos cruzados si usas CDN externo
                logging: false,         // Desactiva logs molestos en consola
                backgroundColor: "#ffffff", // Asegura fondo blanco plano detrás de las cartas
                width: 1056,            // Forzamos el ancho exacto del lienzo
                height: 1632            // Forzamos el alto exacto del lienzo
            }).then(function(canvasResultante) {
                // Convertimos el Canvas a formato JPG con calidad equilibrada del 90%
                const imagenJpg = canvasResultante.toDataURL('image/jpeg', 0.90);
                
                // Creamos un disparador virtual de descarga nativo
                const enlaceDescarga = document.createElement('a');
                enlaceDescarga.download = 'pliego-monumental-definitivo.jpg';
                enlaceDescarga.href = imagenJpg;
                
                document.body.appendChild(enlaceDescarga);
                enlaceDescarga.click();
                document.body.removeChild(enlaceDescarga);

                // Restauramos el estado original del botón
                btnJpg.disabled = false;
                btnJpg.innerText = "🖼 Descargar Pliego (JPG)";
            }).catch(function(error) {
                alert("Error al compilar el pliego a JPG: " + error);
                btnJpg.disabled = false;
                btnJpg.innerText = "🖼 Descargar Pliego (JPG)";
            });
        });
    </script>
</body>
</html>
