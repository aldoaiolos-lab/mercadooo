<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Lotería</title>
    <style>
        /* Eliminamos márgenes y barras de scroll del contenedor padre */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f0f17; /* Color de fondo idéntico al del sistema */
        }

        /* Forzamos al iframe a ocupar el 100% exacto de la pantalla */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- El contenedor que clona tu sitio original en tiempo real -->
    <iframe 
        src="https://aldoaiolos-lab.github.io/mercadooo/loteriasftware.html" 
        title="Generador de Lotería"
        allow="fullscreen">
    </iframe>

</body>
</html>
